<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>EDUINSYS 학부모</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        /* 로그인 화면 */
        .login-screen {
            min-height: 100vh;
            background: linear-gradient(180deg, #ffffff 0%, #fdf2f8 50%, #fce7f3 100%);
            display: flex;
            flex-direction: column;
            padding: 0 24px;
            padding-bottom: 48px;
        }

        .login-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding-top: calc(env(safe-area-inset-top, 40px) + 80px);
            padding-bottom: calc(env(safe-area-inset-bottom, 34px) + 40px);
        }

        .parent-label {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 16px);
            right: 16px;
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }

        .logo-title-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-description {
            text-align: center;
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-top: 40px;
        }

        .app-description strong {
            color: #374151;
            font-weight: 600;
        }

        .login-bottom-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logo-container {
            margin-bottom: 16px;
        }

        .logo-image {
            width: 240px;
            height: auto;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 10px 20px rgba(236, 72, 153, 0.3));
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        .app-title {
            font-size: 32px;
            font-weight: 900;
            background: linear-gradient(135deg, #ec4899 0%, #db2777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .app-subtitle {
            font-size: 16px;
            color: #9ca3af;
            margin-bottom: 60px;
        }

        .login-buttons {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 16px 24px;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            width: 100%;
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .btn-kakao {
            background: #FEE500;
            color: #191919;
        }

        .btn-kakao:hover {
            background: #F5DC00;
            box-shadow: 0 8px 24px rgba(254, 229, 0, 0.4);
        }

        .btn-google {
            background: #ffffff;
            color: #374151;
            border: 2px solid #e5e7eb;
        }

        .btn-google:hover {
            background: #f9fafb;
            border-color: #d1d5db;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        .kakao-icon {
            width: 24px;
            height: 24px;
        }

        .google-icon {
            width: 22px;
            height: 22px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            width: 100%;
            max-width: 320px;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e7eb;
        }

        .phone-login-link {
            color: #9ca3af;
            font-size: 14px;
            text-decoration: underline;
            cursor: pointer;
            transition: color 0.2s;
        }

        .phone-login-link:hover {
            color: #ec4899;
        }

        /* 메인 화면 */
        .main-screen {
            display: none;
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            min-height: 100vh;
            padding: 16px;
            padding-bottom: calc(80px + 48px);
        }

        .main-screen.active {
            display: block;
        }

        .login-screen.hidden {
            display: none;
        }

        .menu-card {

            border-radius: 20px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        .menu-card:active {
            transform: scale(0.98);
        }

        .bottom-nav {
            position: fixed;
            bottom: 34px;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #f3f4f6;
            padding: 8px 0 12px 0;

        .nav-item {

            align-items: center;
            padding: 8px;
            color: #9ca3af;
            text-decoration: none;
            transition: color 0.2s;
        }

        .nav-item.active,

        }

        .nav-item span:first-child {
            font-size: 24px;
        }

        .nav-item span:last-child {

            margin-top: 2px;
        }

        /* 유저 프로필 헤더 */

            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: white;
            border-radius: 16px;
            margin-bottom: 20px;

        .user-email {

            left: 16px;

        /* 스플래시/로딩 화면 */
        .splash-screen {

            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;

            margin-bottom: 8px;

        }

        .splash-label {

            padding: 8px 20px;

            font-weight: 600;

        .splash-text {
            margin-top: 32px;
            font-size: 14px;
            color: #9ca3af;
            letter-spacing: 2px;
        }

        .splash-dots {
            display: flex;
            gap: 8px;
            margin-top: 24px;
        }

        .splash-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ec4899;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .splash-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .splash-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dotPulse {

            0%,
            80%,

                transform: scale(0.8);
                opacity: 0.5;
            }

            40% {

                opacity: 1;
            }

        /* 로그인 로딩 오버레이 */
        .login-loading-overlay {

            background: linear-gradient(180deg, #ffffff 0%, #fdf2f8 50%, #fce7f3 100%);

            flex-direction: column;

            justify-content: center;
            z-index: 10000;

            visibility: hidden;

        }

            }
        }

        .login-loading-text {

            font-weight: 600;

            text-align: center;
        }

        .login-loading-subtext {

            border-top-color: #ec4899;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>

</head>

    <!-- Capacitor Browser Plugin Wrapper -->
    <script>
        (function () {
            window.CapacitorBrowser = {
                open: async function (options) {
                    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
                        return await window.Capacitor.Plugins.Browser.open(options);
                    } else {
                        // Fallback: window.location (웹에서 사용)
                        window.location.href = options.url;
                        return;
                    }
                },
                close: async function () {
                    if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.Browser) {
                        return await window.Capacitor.Plugins.Browser.close();
                    }
                }
            };
            console.log('[Capacitor Browser] Plugin wrapper loaded');
        })();
    </script>

    <!-- FCM Service -->

    <script>
        console.log('[Init] Script loading started');

        // OAuth Promise 선언
        window.oauthResolve = null;
        window.oauthReject = null;

        // Firebase Authentication Native Google Sign-In
        async function loginWithGoogleNative() {
            if (!window.Capacitor?.Plugins?.FirebaseAuthentication) {
                throw new Error('FirebaseAuthentication plugin not available');
            }

            showLoginLoading();

            try {
                const plugin = window.Capacitor.Plugins.FirebaseAuthentication;

                // 기존 세션 정리
                if (window.supabase) {
                    try { await window.supabase.auth.signOut(); } catch (_) { }
                }

                // Firebase 로그아웃 추가 (계정 선택 화면 보장)
                try {
                    await plugin.signOut();
                } catch (_) {
                    // signOut 실패해도 계속 진행 (이미 로그아웃 상태일 수 있음)
                }

                const res = await plugin.signInWithGoogle({ useCredentialManager: false });
                const idToken = res?.credential?.idToken || res?.idToken || null;

                if (!idToken) {
                    throw new Error('Google idToken not found');
                }

                console.log('[Login] Supabase signInWithIdToken starting...');
                const { data, error } = await window.supabase.auth.signInWithIdToken({
                    provider: 'google',
                    token: idToken
                });

                if (error) {
                    console.error('[Login] Supabase signInWithIdToken failed:', error);
                    throw error;
                }

                if (!data?.session?.user) {
                    console.error('[Login] No session/user in response');
                    throw new Error('No session user');
                }

                console.log('[Login] Supabase session established successfully');
                const user = data.session.user;
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userId', user.id);
                localStorage.setItem('userName', user.user_metadata?.full_name || user.user_metadata?.name || '학부모님');
                localStorage.setItem('userEmail', user.email || '');
                localStorage.setItem('userPhoto', user.user_metadata?.avatar_url || user.user_metadata?.picture || '');

                // ✅ 로그인 성공 직후 FCM 토큰 등록 재시도
                if (window.fcmService) {
                    console.log('[Login] Triggering FCM token registration...');
                    window.fcmService.registerTokenAfterLogin();
                }

                console.log('[Login] Proceeding to approval status check...');
                await handleParentApprovalRedirect(user.id);
            } catch (e) {
                console.error('[Login] Unexpected login error:', e);
                hideLoginLoading();
                alert('Google 로그인 실패: ' + (e?.message || e));
            }
        }

        console.log('[OAuth] Login functions loading...');
    </script>

    <script>
        function isInvalidRefreshTokenError(error) {
            const message = (error?.message || error?.error_description || '').toLowerCase();
            return message.includes('invalid refresh token') || message.includes('refresh token not found');
        }

        async function recoverFromInvalidRefreshToken(error) {
            if (!isInvalidRefreshTokenError(error)) {
                return false;
            }

            console.warn('[Auth] Invalid refresh token detected. Clearing stale auth state...');
            try {
                await window.supabase?.auth?.signOut({ scope: 'local' });
            } catch (_) { }

            if (typeof clearAuthStorage === 'function') {
                clearAuthStorage();
            } else {
                localStorage.clear();
            }
            return true;
        }

        // 로그인 상태 확인
        async function checkLoginStatus() {
            // 로그아웃 파라미터가 있으면 자동 리다이렉트 방지
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('logout') === 'true') {
                // URL에서 파라미터 제거 (깔끔한 URL 유지)
                window.history.replaceState({}, document.title, window.location.pathname);

                // 확실하게 로그아웃 (local scope로 충분)
                try {
                    await window.supabase?.auth?.signOut({ scope: 'local' });
                } catch (e) { }

                // 인증 스토리지 정리
                clearAuthStorage();
                // 로그인 화면 표시
                showLoginScreen();
                return;
            }

            // Supabase 세션 확인 (모든 인증의 기본)
            if (isSupabaseConfigured()) {
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session?.user) {
                        const user = session.user;
                        localStorage.setItem('isLoggedIn', 'true');
                        localStorage.setItem('userId', user.id);  // userId 추가
                        localStorage.setItem('userName', user.user_metadata?.full_name || user.user_metadata?.name || '학부모님');
                        localStorage.setItem('userEmail', user.email || '');
                        localStorage.setItem('userPhoto', user.user_metadata?.avatar_url || user.user_metadata?.picture || '');

                        // 전화번호가 있으면 저장
                        if (user.phone) {
                            localStorage.setItem('userPhone', user.phone);
                        }

                        // 학부모 승인 상태 확인
                        await handleParentApprovalRedirect(user.id);
                        return;
                    }
                } catch (e) {
                    console.error('세션 확인 오류:', e);
                    const recovered = await recoverFromInvalidRefreshToken(e);
                    if (recovered) {
                        showLoginScreen();
                        return;
                    }
                }
            }

            // Supabase 세션이 없는 경우: localStorage만 있어도 세션 재확인 시도
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const userId = localStorage.getItem('userId');

            if (isLoggedIn === 'true' && userId) {
                // 세션이 만료되었을 수 있으므로 다시 한 번 확인
                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    if (session?.user) {
                        await handleParentApprovalRedirect(userId);
                        return;
                    }
                } catch (e) {
                    console.error('세션 재확인 오류:', e);
                    const recovered = await recoverFromInvalidRefreshToken(e);
                    if (recovered) {
                        showLoginScreen();
                        return;
                    }
                }
                // 세션이 만료되면 로그인 화면으로
                if (typeof clearAuthStorage === 'function') {
                    clearAuthStorage();
                } else {
                    localStorage.clear();
                }
                showLoginScreen();
                return;
            }

            // 로그인 정보가 없으면 로그인 화면
            showLoginScreen();
        }

        // 학부모 승인 상태에 따른 페이지 분기
        async function handleParentApprovalRedirect(userId) {
            try {
                // 등록된 자녀 확인
                const { data: children, error } = await supabase
                    .from('students')
                    .select('approval_status')
                    .eq('parent_id', userId);

                if (error) {
                    console.error('자녀 조회 실패:', error);
                    showLoginScreen();
                    return;
                }

                // 자녀가 없으면 가입 페이지로
                if (!children || children.length === 0) {
                    window.location.href = 'parent-join.html';
                    return;
                }

                // 승인 완료된 자녀가 있으면 메인 화면
                const hasApprovedChild = children.some(c => c.approval_status === 'approved');
                if (hasApprovedChild) {
                    showMainScreen();
                    updateUserInfo();

                    // 푸시 알림 초기화
                    if (window.Capacitor && window.Capacitor.Plugins) {
                        initPushNotifications();
                    }
                    return;
                }

                // 승인 대기중이면 상태 페이지로
                window.location.href = 'parent-status.html';
            } catch (error) {
                console.error('승인 상태 확인 에러:', error);
                showLoginScreen();
            }
        }

        function showLoginScreen() {
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('main-screen').classList.remove('active');
        }

        function showMainScreen() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.add('active');
        }

        // 로그인 로딩 오버레이 처리
        function showLoginLoading() {
            const overlay = document.getElementById('login-loading-overlay');
            if (overlay) {
                overlay.classList.add('show');
            }
        }

        function hideLoginLoading() {
            const overlay = document.getElementById('login-loading-overlay');
            if (overlay) {
                overlay.classList.remove('show');
            }
        }

        function updateUserInfo() {
            const userName = localStorage.getItem('userName') || '학부모님';
            const userEmail = localStorage.getItem('userEmail') || localStorage.getItem('userPhone') || '';
            const userPhoto = localStorage.getItem('userPhoto');

            document.getElementById('user-name').textContent = userName;
            document.getElementById('user-email').textContent = userEmail;

            if (userPhoto) {
                const avatarEl = document.getElementById('user-avatar');
                avatarEl.innerHTML = `<img src="${userPhoto}" class="w-full h-full rounded-full object-cover" alt="프로필">`;
            }
        }

        // Supabase 설정 확인
        function isSupabaseConfigured() {
            return typeof supabase !== 'undefined' && supabase !== null;
        }

        // 카카오 로그인
        async function loginWithKakao() {
            await loginWithOAuth('kakao');
        }

        // 구글 로그인 (Native + OAuth Fallback)
        async function loginWithGoogle() {
            const isApp = window.Capacitor && window.Capacitor.getPlatform && window.Capacitor.getPlatform() !== 'web';

            if (isApp) {
                if (window.Capacitor.Plugins?.FirebaseAuthentication) {
                    await loginWithGoogleNative();
                } else {
                    // Firebase 플러그인이 없으면 OAuth fallback
                    console.log('[Login] Firebase plugin not available, using OAuth fallback');
                    await loginWithOAuth('google');
                }
            } else {
                // 웹에서는 OAuth
                await loginWithOAuth('google');
            }
        }

        // 전역 함수로 등록 (HTML onclick에서 접근 가능하도록)
        window.loginWithKakao = loginWithKakao;
        window.loginWithGoogle = loginWithGoogle;

        console.log('[OAuth] Login functions registered');

        // OAuth 로그인 공통 함수
        async function loginWithOAuth(provider) {
            console.log(`[${provider} Login] 버튼 클릭됨`);

            if (!isSupabaseConfigured()) {
                alert('서버 연결에 실패했습니다.\n잠시 후 다시 시도해주세요.');
                return;
            }

            try {
                console.log(`[${provider} Login] OAuth 요청 시작...`);

                // 앱/웹 환경 확인
                const isApp = window.Capacitor && window.Capacitor.getPlatform && window.Capacitor.getPlatform() !== 'web';
                // Custom scheme 사용 (Deep link와 일치)
                const redirectUrl = isApp ? 'inclassparent://auth' : window.location.origin + window.location.pathname;
                console.log(`[${provider} Login] redirectTo:`, redirectUrl, `(isApp: ${isApp})`);

                // provider별 prompt 파라미터 결정
                // Google: select_account (계정 선택 화면 강제)
                // Kakao: login (재인증 유도)
                const promptParam = provider === 'google' ? 'select_account' : 'login';

                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: redirectUrl,
                        queryParams: {
                            prompt: promptParam
                        }
                    }
                });

                if (error) {
                    console.error(`[${provider} Login] OAuth 실패:`, error);
                    hideLoginLoading();
                    alert('로그인에 실패했습니다: ' + error.message);
                    return;
                }

                console.log(`[${provider} Login] OAuth URL:`, data.url);

                // 로딩 오버레이 표시
                showLoginLoading();

                // 앱에서는 Promise 기반으로 처리
                if (isApp && data.url) {
                    const result = await new Promise((resolve, reject) => {
                        window.oauthResolve = resolve;
                        window.oauthReject = reject;

                        // 타임아웃 (60초)
                        setTimeout(() => {
                            if (window.oauthResolve) {
                                window.oauthResolve = null;
                                window.oauthReject = null;
                                resolve({ success: false, timeout: true });
                            }
                        }, 60000);

                        // Browser로 OAuth 페이지 열기
                        window.CapacitorBrowser.open({ url: data.url });
                    });

                    console.log('[OAuth] 브라우저 결과:', result);

                    // 타임아웃 또는 실패 시 로딩 숨기기
                    if (!result.success) {
                        hideLoginLoading();
                        alert('로그인에 실패했습니다. 다시 시도해주세요.');
                    }
                } else if (data.url) {
                    // 웹에서는 그대로 이동
                    window.location.href = data.url;
                }
            } catch (e) {
                console.error(`[${provider} Login] 예외 발생:`, e);
                hideLoginLoading();
                alert('로그인 중 오류가 발생했습니다: ' + e.message);
            }
        }

        // FCM 토큰 저장
        async function saveFcmToken(phone) {
            const fcmToken = localStorage.getItem('fcmToken');
            if (fcmToken && window.supabase) {
                try {
                    const phoneWithoutHyphen = phone.replace(/-/g, '');
                    const { error } = await supabase.from('push_tokens').upsert({
                        phone_number: phoneWithoutHyphen,
                        token: fcmToken,
                        platform: 'android',
                        updated_at: new Date().toISOString()
                    }, {
                        onConflict: 'phone_number'
                    });

                    if (error) {
                        console.error('토큰 저장 실패:', error);
                    } else {
                        console.log('토큰 Supabase 저장 완료');
                    }
                } catch (e) {
                    console.error('토큰 업로드 오류:', e);
                }
            }
        }

        // 로그아웃
        async function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                // Firebase Authentication 로그아웃 (네이티브 앱)
                if (window.Capacitor?.Plugins?.FirebaseAuthentication) {
                    try {
                        await window.Capacitor.Plugins.FirebaseAuthentication.signOut();
                        console.log('[Logout] Firebase signOut completed');
                    } catch (e) {
                        console.error('[Logout] Firebase signOut 오류:', e);
                    }
                }

                // Supabase 로그아웃 + 스토리지 정리 (auth-utils.js 유틸 활용)
                await performLogout();

                showLoginScreen();
            }
        }

        // 스플래시 화면 처리
        function hideSplashScreen() {
            const splash = document.getElementById('splash-screen');
            if (splash) {
                splash.classList.add('fade-out');
                setTimeout(() => {
                    splash.style.display = 'none';
                }, 500);
            }
        }

        // 페이지 로드 시 초기화
        document.addEventListener('DOMContentLoaded', function () {
            // 스플래시 화면을 2초 후에 숨김
            setTimeout(() => {
                hideSplashScreen();
                checkLoginStatus();
            }, 2000);

            // Capacitor 푸시 알림 초기화
            if (window.Capacitor && window.Capacitor.Plugins) {
                initPushNotifications();
            }
        });

        // 인앱 알림 표시 함수
        function showInAppNotification(title, body) {
            const toast = document.getElementById('push-toast');
            const toastTitle = document.getElementById('push-toast-title');
            const toastBody = document.getElementById('push-toast-body');

            if (!toast || !toastTitle || !toastBody) return;

            toastTitle.textContent = title;
            toastBody.textContent = body;
            toast.style.cssText = 'display: block !important;';
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
                toast.style.cssText = 'display: none !important;';
            }, 5000);

            toast.onclick = () => {
                toast.classList.remove('show');
                toast.style.cssText = 'display: none !important;';
            };
        }

        // 푸시 알림 초기화 (새로운 FCM Service 사용)
        async function initPushNotifications() {
            try {
                if (window.fcmService && !window.fcmService.isInitialized) {
                    await window.fcmService.initialize();
                    window.fcmService.startAckRetryMonitor();
                    console.log('[FCM] FCM Service 초기화 완료');
                }
            } catch (error) {
                console.error('푸시 초기화 실패:', error);
            }
        }

        // URL 파싱 헬퍼 함수 (new URL 기반 일원화)
        function parseOAuthUrl(urlString) {
            try {
                const url = new URL(urlString);
                const hashParams = new URLSearchParams(url.hash.slice(1)); // # 제거
                const searchParams = url.searchParams;

                const getParam = (name) => hashParams.get(name) || searchParams.get(name);

                return {
                    error: getParam('error'),
                    errorDescription: getParam('error_description'),
                    code: getParam('code'),
                    accessToken: getParam('access_token'),
                    refreshToken: getParam('refresh_token'),
                    expiresIn: getParam('expires_in'),
                    tokenType: getParam('token_type')
                };
            } catch (e) {
                console.error('[OAuth] URL parsing failed:', e);
                return null;
            }
        }

        // OAuth 콜백 URL 처리 (Capacitor 앱이 열릴 때)
        if (window.Capacitor && window.Capacitor.Plugins && window.Capacitor.Plugins.App) {
            window.Capacitor.Plugins.App.addListener('appUrlOpen', async (data) => {
                console.log('[App URL Open] URL:', data.url);

                // URL 파싱
                const params = parseOAuthUrl(data.url);
                if (!params) {
                    if (window.oauthReject) {
                        window.oauthReject(new Error('Invalid OAuth callback URL'));
                        window.oauthReject = null;
                    }
                    return;
                }

                // ERROR 파라미터 우선 처리
                if (params.error) {
                    console.error('[OAuth Error]', params.error, params.errorDescription);
                    hideLoginLoading();
                    if (window.oauthReject) {
                        window.oauthReject(new Error(params.error));
                        window.oauthReject = null;
                    }
                    alert('로그인이 취소되었습니다.');
                    return;
                }

                // Browser 닫기 (공통 경로)
                try {
                    if (window.Capacitor.Plugins.Browser) {
                        await window.Capacitor.Plugins.Browser.close();
                    }
                    if (window.CapacitorBrowser) {
                        window.CapacitorBrowser.close();
                    }
                } catch (e) {
                    console.warn('[OAuth] Browser close warning:', e);
                }

                // PKCE code 우선 처리 (Supabase v2 권장)
                if (params.code && typeof window.supabase !== 'undefined') {
                    console.log('[OAuth] Code detected, exchanging for session...');
                    try {
                        const { data, error } = await window.supabase.auth.exchangeCodeForSession(params.code);
                        if (error) throw error;
                        console.log('[OAuth] Code exchanged successfully');
                    } catch (e) {
                        console.error('[OAuth] Code exchange failed:', e);
                        hideLoginLoading();
                        if (window.oauthReject) {
                            window.oauthReject(e);
                            window.oauthReject = null;
                        }
                        alert('로그인에 실패했습니다: ' + e.message);
                        return;
                    }
                }
                // 토큰 직접 파싱 (fallback)
                else if (params.accessToken && typeof window.supabase !== 'undefined') {
                    console.log('[OAuth] Token detected, setting session...');
                    try {
                        await window.supabase.auth.setSession({
                            access_token: params.accessToken,
                            refresh_token: params.refreshToken || '',
                            expires_in: params.expiresIn ? parseInt(params.expiresIn) : undefined,
                            token_type: params.tokenType || 'bearer'
                        });
                        console.log('[OAuth] Session set via tokens');
                    } catch (e) {
                        console.error('[OAuth] Set session failed:', e);
                        hideLoginLoading();
                        if (window.oauthReject) {
                            window.oauthReject(e);
                            window.oauthReject = null;
                        }
                        alert('로그인에 실패했습니다: ' + e.message);
                        return;
                    }
                }

                // 세션 확인 및 UI 업데이트
                await new Promise(resolve => setTimeout(resolve, 500));
                const { data: { session } } = await window.supabase.auth.getSession();
                console.log('[OAuth] Session check:', session?.user ? '성공' : '실패');

                if (session?.user) {
                    const user = session.user;
                    localStorage.setItem('isLoggedIn', 'true');
                    localStorage.setItem('userId', user.id);
                    localStorage.setItem('userName', user.user_metadata?.full_name || user.user_metadata?.name || '학부모님');
                    localStorage.setItem('userEmail', user.email || '');
                    localStorage.setItem('userPhoto', user.user_metadata?.avatar_url || user.user_metadata?.picture || '');

                    // 전화번호가 있으면 저장
                    if (user.phone) {
                        localStorage.setItem('userPhone', user.phone);
                    }

                    // OAuth Promise resolve
                    if (window.oauthResolve) {
                        window.oauthResolve({ success: true, session });
                        window.oauthResolve = null;
                        window.oauthReject = null;
                    }

                    // 학부모 승인 상태 확인
                    await handleParentApprovalRedirect(user.id);
                } else {
                    console.warn('[OAuth] 세션이 없습니다');
                    hideLoginLoading();
                    if (window.oauthReject) {
                        window.oauthReject(new Error('No session after OAuth'));
                        window.oauthReject = null;
                    }
                    alert('로그인에 실패했습니다. 다시 시도해주세요.');
                    showLoginScreen();
                }
            });
            console.log('[App URL Listener] 리스너 등록 완료');
        }
    </script>
</body>
