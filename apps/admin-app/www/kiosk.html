<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <style>
        html,
        body {
            -webkit-text-size-adjust: 100% !important;
            text-size-adjust: 100% !important;
        }
    </style>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>키오스크 - 꿈터공부방</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="./styles/admin-tailwind.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Symbols+Outlined" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #fce7f3 0%, #e9d5ff 25%, #dbeafe 50%, #fef3c7 75%, #fef2f2 100%);
            min-height: 100vh;
        }

        /* 세로모드: 전체화면 + 중앙 정렬 */
        .kiosk-wrapper {
            max-width: 100% !important;
            height: 100vh !important;
            padding: 1rem !important;
            padding-bottom: 5rem !important;
            border-radius: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
        }

        /* 세로모드: 컨텐츠 영역 중앙 정렬 */
        .kiosk-content {
            display: flex !important;
            flex-direction: column !important;
            align-items: center !important;
            justify-content: center !important;
        }

        /* 하단 버튼 고정 */
        .kiosk-button-section {
            position: fixed !important;
            bottom: 0 !important;
            left: 0 !important;
            right: 0 !important;
            padding: 0.75rem 1rem !important;
            gap: 0.75rem !important;
        }

        .kiosk-button-section .kiosk-action-btn {
            padding: 1.5rem 1rem !important;
            font-size: 1.75rem !important;
            flex: 1 !important;
        }

        /* 세로모드 키패드 버튼 높이 (화면에 맞춤) */
        .kiosk-content>.kiosk-keypad .kiosk-key {
            padding-top: 3rem !important;
            padding-bottom: 3rem !important;
        }

        /* 세로모드: 뒤로가기 버튼 작게 (키패드와 겹치지 않게) */
        .kiosk-back-btn {
            padding: 0.5rem !important;
            width: 2.5rem !important;
            height: 2.5rem !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .kiosk-back-btn span {
            font-size: 1.5rem !important;
        }

        /* 키패드 숫자 2배 더 크게 */
        .kiosk-key {
            font-size: 4rem !important;
        }

        /* 세로모드 입력박스 크기 (1.5배) */
        .kiosk-digit {
            width: 7.5rem !important;
            height: 8.25rem !important;
            min-height: 8.25rem !important;
            font-size: 3.75rem !important;
        }

        /* 세로모드: 타이틀 섹션 숨김 */
        .kiosk-title-section {
            display: none !important;
        }

        /* 세로모드: 가로모드용 요소들 숨김 */
        #student-name-landscape,
        .kiosk-landscape-instruction {
            display: none !important;
        }

        /* 세로모드: 홈 링크 숨김 */
        .kiosk-home-link {
            display: none !important;
        }

        /* 세로모드 안내 문구 */
        .portrait-instruction {
            font-size: 1.2rem !important;
            margin-bottom: 0.5rem !important;
        }

        /* 세로모드: 학생 이름 (가로모드와 동일) */
        #student-name {
            font-size: 4.5rem !important;
        }

        /* 세로모드: 키패드 버튼 화면 가득 차게 */
        .kiosk-content>.kiosk-keypad {
            width: 100% !important;
        }

        .kiosk-content>.kiosk-keypad .kiosk-key {
            width: 100% !important;
            font-size: 4rem !important;
        }

        /* 키패드 버튼 빠른 반응 */
        .kiosk-key {
            transition: transform 50ms ease-out, box-shadow 100ms ease-out !important;
        }

        .kiosk-key:active {
            transform: scale(0.95) !important;
        }

        /* 가로모드 레이아웃 */
        @media (min-width: 600px) and (orientation: landscape) {

            /* 가로모드: 뒤로가기 버튼 위로 이동 */
            .kiosk-back-btn {
                top: 0.5rem !important;
                left: 0.5rem !important;
            }

            body {
                padding: 0 !important;
            }

            .kiosk-wrapper {
                display: grid !important;
                grid-template-columns: 1fr 1fr !important;
                gap: 2rem !important;
                height: 100vh !important;
                padding: 2rem !important;
                max-width: 100% !important;
                border-radius: 0 !important;
            }

            /* 타이틀 섹션 숨김 */
            .kiosk-title-section {
                display: none !important;
            }

            /* 메인으로 돌아가기 숨김 */
            .kiosk-home-link {
                display: none !important;
            }

            /* 컨텐츠 섹션 */
            .kiosk-content {
                display: flex !important;
                flex-direction: column !important;
                height: 100% !important;
                padding: 0 !important;
                padding-bottom: 6rem !important;
                position: relative !important;
            }

            /* 가로모드: 하단 버튼 고정 (우측 화면 하단만) */
            .kiosk-button-section {
                position: absolute !important;
                bottom: 0 !important;
                left: 0 !important;
                right: 0 !important;
                padding: 1rem !important;
            }

            /* 키패드 섹션 */
            .kiosk-keypad-wrapper {
                display: flex !important;
                flex-direction: column !important;
                align-items: center;
                justify-content: center;
                gap: 1rem !important;
            }

            .kiosk-keypad-wrapper .kiosk-keypad {
                width: 100% !important;
                height: 100% !important;
                max-height: 80vh !important;
                display: grid !important;
                grid-template-rows: repeat(4, 1fr) !important;
                grid-template-columns: repeat(3, 1fr) !important;
                gap: 0.75rem !important;
                margin-bottom: 0 !important;
            }

            /* 세로모드용 키패드 숨김 */
            .kiosk-content>.kiosk-keypad {
                display: none !important;
            }

            .kiosk-key {
                font-size: 2rem !important;
                height: 100% !important;
            }

            /* 학생 정보 */
            #student-info {
                display: none !important;
            }

            /* 세로모드 안내 문구 숨김 */
            .portrait-instruction {
                display: none !important;
            }

            /* 가로모드: 학생 이름 크게 표시 (기본 숨김) */
            #student-name-landscape:not(.hidden) {
                display: block !important;
            }

            #student-name-landscape-text {
                font-size: 4.5rem !important;
                font-weight: 900 !important;
            }

            /* 가로모드: 안내 문구 */
            .kiosk-landscape-instruction {
                display: block !important;
                text-align: center !important;
                font-size: 1.25rem !important;
                font-weight: 700 !important;
                color: #4b5563 !important;
                margin-bottom: 1.5rem !important;
            }

            /* 가로모드: 버튼 높이 1.5배 */
            .kiosk-action-btn {
                padding: 1.5rem 1.5rem !important;
                font-size: 2rem !important;
            }

            /* 번호 입력 */
            .kiosk-digit-display {
                flex: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                margin-bottom: 2rem;
            }

            .kiosk-digit {
                width: 7rem !important;
                height: 7.5rem !important;
                min-height: 7.5rem !important;
                font-size: 3rem !important;
            }
        }

        /* Device-fit layout override: fills any screen without clipping */
        :root {
            --kiosk-gap: clamp(0.5rem, 1.4vmin, 1.1rem);
            --kiosk-pad: clamp(0.5rem, 2vmin, 1.25rem);
            --kiosk-round: clamp(0.9rem, 2.2vmin, 1.6rem);
            --kiosk-digit-w: clamp(3rem, 9.6vmin, 6.4rem);
            --kiosk-digit-h: clamp(3.8rem, 11.2vmin, 7rem);
            --kiosk-digit-size: clamp(1.35rem, 4.2vmin, 2.7rem);
            --kiosk-key-size: clamp(1rem, 3.3vmin, 2.1rem);
            --kiosk-key-h: clamp(2.2rem, 6.8vmin, 5rem);
            --kiosk-action-size: clamp(1rem, 2.8vmin, 1.8rem);
            --kiosk-action-py: clamp(0.7rem, 2.2vmin, 1.2rem);
            --kiosk-name-size: clamp(1.05rem, 2.5vmin, 1.8rem);
            --kiosk-name-pad: clamp(0.45rem, 1.2vmin, 0.8rem);
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            margin: 0;
            min-height: 100dvh !important;
            min-height: 100vh !important;
            padding: 0 !important;
        }

        .kiosk-wrapper {
            width: 100% !important;
            max-width: none !important;
            height: 100dvh !important;
            min-height: 100vh !important;
            padding:
                max(var(--kiosk-pad), env(safe-area-inset-top)) max(var(--kiosk-pad), env(safe-area-inset-right)) max(var(--kiosk-pad), env(safe-area-inset-bottom)) max(var(--kiosk-pad), env(safe-area-inset-left)) !important;
            border-radius: 0 !important;
            box-sizing: border-box !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: stretch !important;
            gap: var(--kiosk-gap) !important;
            overflow: hidden !important;
        }

        .kiosk-content {
            height: 100% !important;
            min-height: 0 !important;
            justify-content: flex-start !important;
            gap: var(--kiosk-gap) !important;
        }

        .kiosk-title-section {
            margin-bottom: var(--kiosk-gap) !important;
        }

        .kiosk-digit-display {
            flex: 0 0 auto !important;
            margin-bottom: 0 !important;
        }

        .kiosk-digit-display .bg-gradient-to-br {
            padding: var(--kiosk-gap) !important;
            border-radius: var(--kiosk-round) !important;
        }

        .kiosk-digit-display .flex.justify-center {
            gap: var(--kiosk-gap) !important;
            margin-bottom: 0 !important;
        }

        .kiosk-digit {
            width: var(--kiosk-digit-w) !important;
            height: var(--kiosk-digit-h) !important;
            min-height: var(--kiosk-digit-h) !important;
            font-size: var(--kiosk-digit-size) !important;
            border-radius: var(--kiosk-round) !important;
        }

        .kiosk-content>.kiosk-keypad,
        .kiosk-keypad-wrapper .kiosk-keypad {
            width: 100% !important;
            flex: 1 1 auto !important;
            min-height: 0 !important;
            margin-bottom: 0 !important;
            gap: var(--kiosk-gap) !important;
            align-content: stretch !important;
            grid-template-rows: repeat(4, minmax(0, 1fr)) !important;
            grid-auto-rows: minmax(var(--kiosk-key-h), 1fr) !important;
        }

        .kiosk-content>.kiosk-keypad>button,
        .kiosk-keypad-wrapper .kiosk-keypad>button {
            width: 100% !important;
            min-height: var(--kiosk-key-h) !important;
            font-size: var(--kiosk-key-size) !important;
            padding-top: 0 !important;
            padding-bottom: 0 !important;
            border-radius: var(--kiosk-round) !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
        }

        .kiosk-button-section {
            position: static !important;
            margin-top: var(--kiosk-gap) !important;
            padding: 0 !important;
            gap: var(--kiosk-gap) !important;
        }

        #student-info,
        #student-name-landscape {
            margin-bottom: var(--kiosk-gap) !important;
        }

        #student-info>div,
        #student-name-landscape>div {
            padding: var(--kiosk-name-pad) !important;
        }

        #student-name,
        #student-name-landscape-text {
            font-size: var(--kiosk-name-size) !important;
            line-height: 1.2 !important;
            white-space: nowrap !important;
            overflow: hidden !important;
            text-overflow: ellipsis !important;
        }

        .portrait-instruction,
        .kiosk-landscape-instruction {
            font-size: clamp(0.95rem, 2vmin, 1.15rem) !important;
            margin-bottom: clamp(0.35rem, 1vmin, 0.6rem) !important;
        }

        .kiosk-action-btn {
            padding: var(--kiosk-action-py) 0.8rem !important;
            font-size: var(--kiosk-action-size) !important;
            border-radius: var(--kiosk-round) !important;
            min-height: clamp(3rem, 9vmin, 5.2rem) !important;
        }

        .kiosk-back-btn {
            top: max(0.45rem, env(safe-area-inset-top)) !important;
            left: max(0.45rem, env(safe-area-inset-left)) !important;
            width: clamp(2.1rem, 5vmin, 3rem) !important;
            height: clamp(2.1rem, 5vmin, 3rem) !important;
            padding: 0 !important;
            border-radius: clamp(0.6rem, 1.6vmin, 1rem) !important;
        }

        .kiosk-back-btn span {
            font-size: clamp(1rem, 2.6vmin, 1.5rem) !important;
        }

        @media (orientation: portrait) {
            .kiosk-wrapper {
                display: flex !important;
            }

            .kiosk-keypad-wrapper {
                display: none !important;
            }

            .kiosk-content>.kiosk-keypad {
                display: grid !important;
            }
        }

        @media (orientation: landscape) {
            .kiosk-wrapper {
                display: grid !important;
                grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) !important;
                align-items: stretch !important;
            }

            .kiosk-keypad-wrapper {
                display: flex !important;
                min-height: 0 !important;
            }

            .kiosk-keypad-wrapper .kiosk-keypad {
                height: 100% !important;
            }

            .kiosk-content {
                display: flex !important;
                min-height: 0 !important;
                padding-bottom: 0 !important;
            }

            .kiosk-content>.kiosk-keypad {
                display: none !important;
            }
        }

        @media (max-height: 560px) {
            :root {
                --kiosk-key-h: clamp(2.2rem, 7.2vmin, 4rem);
                --kiosk-action-py: clamp(0.45rem, 1.5vmin, 0.7rem);
            }

            .kiosk-title-section,
            .kiosk-home-link {
                display: none !important;
            }
        }
    </style>
</head>

<body class="flex items-center justify-center p-0">
    <!-- 뒤로가기 버튼 (세련된 디자인) -->
    <button onclick="window.location.href='admin-main.html'"
        class="kiosk-back-btn fixed top-4 left-4 p-4 bg-white/90 backdrop-blur-lg rounded-2xl shadow-lg hover:bg-white hover:shadow-xl transition-all duration-200 z-50 border border-gray-200/50">
        <span class="material-symbols-outlined text-gray-700 text-3xl">arrow_back_ios</span>
    </button>

    <div
        class="kiosk-wrapper bg-gradient-to-br from-white to-pink-50/30 p-8 w-full shadow-[0_20px_60px_rgba(0,0,0,0.15)] border border-white/50">
        <!-- 왼쪽: 키패드 (가로모드) -->
        <div class="kiosk-keypad-wrapper hidden">
            <div class="kiosk-keypad grid grid-cols-3 gap-5 mb-10">
                <button onclick="kioskPressKey('1')"
                    class="kiosk-key bg-gradient-to-br from-pink-100 to-pink-200 hover:from-pink-200 hover:to-pink-300 text-3xl font-bold text-pink-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-pink-200/50 hover:shadow-xl hover:shadow-pink-300/50 active:scale-95 active:shadow-md">1</button>
                <button onclick="kioskPressKey('2')"
                    class="kiosk-key bg-gradient-to-br from-purple-100 to-purple-200 hover:from-purple-200 hover:to-purple-300 text-3xl font-bold text-purple-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-purple-200/50 hover:shadow-xl hover:shadow-purple-300/50 active:scale-95 active:shadow-md">2</button>
                <button onclick="kioskPressKey('3')"
                    class="kiosk-key bg-gradient-to-br from-blue-100 to-blue-200 hover:from-blue-200 hover:to-blue-300 text-3xl font-bold text-blue-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-blue-200/50 hover:shadow-xl hover:shadow-blue-300/50 active:scale-95 active:shadow-md">3</button>
                <button onclick="kioskPressKey('4')"
                    class="kiosk-key bg-gradient-to-br from-green-100 to-green-200 hover:from-green-200 hover:to-green-300 text-3xl font-bold text-green-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-green-200/50 hover:shadow-xl hover:shadow-green-300/50 active:scale-95 active:shadow-md">4</button>
                <button onclick="kioskPressKey('5')"
                    class="kiosk-key bg-gradient-to-br from-yellow-100 to-yellow-200 hover:from-yellow-200 hover:to-yellow-300 text-3xl font-bold text-yellow-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-yellow-200/50 hover:shadow-xl hover:shadow-yellow-300/50 active:scale-95 active:shadow-md">5</button>
                <button onclick="kioskPressKey('6')"
                    class="kiosk-key bg-gradient-to-br from-orange-100 to-orange-200 hover:from-orange-200 hover:to-orange-300 text-3xl font-bold text-orange-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-orange-200/50 hover:shadow-xl hover:shadow-orange-300/50 active:scale-95 active:shadow-md">6</button>
                <button onclick="kioskPressKey('7')"
                    class="kiosk-key bg-gradient-to-br from-teal-100 to-teal-200 hover:from-teal-200 hover:to-teal-300 text-3xl font-bold text-teal-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-teal-200/50 hover:shadow-xl hover:shadow-teal-300/50 active:scale-95 active:shadow-md">7</button>
                <button onclick="kioskPressKey('8')"
                    class="kiosk-key bg-gradient-to-br from-indigo-100 to-indigo-200 hover:from-indigo-200 hover:to-indigo-300 text-3xl font-bold text-indigo-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-indigo-200/50 hover:shadow-xl hover:shadow-indigo-300/50 active:scale-95 active:shadow-md">8</button>
                <button onclick="kioskPressKey('9')"
                    class="kiosk-key bg-gradient-to-br from-rose-100 to-rose-200 hover:from-rose-200 hover:to-rose-300 text-3xl font-bold text-rose-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-rose-200/50 hover:shadow-xl hover:shadow-rose-300/50 active:scale-95 active:shadow-md">9</button>
                <button onclick="kioskClearInput()"
                    class="bg-gradient-to-br from-red-100 to-red-200 hover:from-red-200 hover:to-red-300 text-xl font-bold text-red-500 rounded-2xl py-5 transition-all duration-150 shadow-lg shadow-red-200/50 hover:shadow-xl hover:shadow-red-300/50 active:scale-95">지우기</button>
                <button onclick="kioskPressKey('0')"
                    class="kiosk-key bg-gradient-to-br from-cyan-100 to-cyan-200 hover:from-cyan-200 hover:to-cyan-300 text-3xl font-bold text-cyan-600 rounded-2xl py-6 transition-all duration-150 shadow-lg shadow-cyan-200/50 hover:shadow-xl hover:shadow-cyan-300/50 active:scale-95 active:shadow-md">0</button>
                <button onclick="kioskBackspace()"
                    class="bg-gradient-to-br from-gray-100 to-gray-200 hover:from-gray-200 hover:to-gray-300 text-2xl font-bold text-gray-500 rounded-2xl py-5 transition-all duration-150 shadow-lg shadow-gray-200/50 hover:shadow-xl hover:shadow-gray-300/50 active:scale-95">←</button>
            </div>
        </div>

        <!-- 우측: 컨텐츠 (세로모드 전체, 가로모드 우측) -->
        <div class="kiosk-content">
            <!-- 세로모드: 안내 문구 (제거됨 - 입력박스 위로 이동) -->

            <div class="kiosk-title-section text-center mb-10">
                <div
                    class="w-24 h-24 bg-gradient-to-br from-pink-200 to-purple-200 rounded-3xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-pink-200/50">
                    <span class="material-symbols-outlined text-pink-600 text-6xl">touch_app</span>
                </div>
                <h1
                    class="text-4xl font-bold bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent mb-3">
                    키오스크</h1>
                <p class="text-gray-400 text-lg">부모님 휴대폰 번호 마지막 4자리</p>
            </div>

            <!-- 학생 정보 표시 영역 -->
            <div id="student-info" class="hidden mb-6">
                <!-- 세로모드용 -->
                <div class="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-4 border-2 border-emerald-200">
                    <div class="text-center">
                        <div id="student-name" class="font-bold text-emerald-700"></div>
                    </div>
                </div>
            </div>

            <!-- 번호 입력 표시 -->
            <div class="kiosk-digit-display mb-4">
                <!-- 가로모드: 학생 이름 -->
                <div id="student-name-landscape" class="hidden mb-2">
                    <div
                        class="bg-gradient-to-br from-emerald-50 to-teal-50 rounded-2xl p-4 border-2 border-emerald-200">
                        <div class="text-center">
                            <div id="student-name-landscape-text" class="font-bold text-emerald-700"></div>
                        </div>
                    </div>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="auth.js"></script>
    <script src="data-service.js"></script>

    <script>
        // ===================================================================
        // FCM 401 장애 해결: 빌드 태그 및 런타임 설정
        // ===================================================================
        const KIOSK_BUILD_TAG = 'kiosk-fcm-fix-2026-02-28';
        const SESSION_REFRESH_THRESHOLD = 60; // 세션 갱신 임계값 (초)

        // 페이지 로드 시 콘솔 출력 (즉시 실행 - 안전함)
        console.log('[KIOSK] Build:', KIOSK_BUILD_TAG, 'Loaded at:', new Date().toISOString());

        // window.supabase 런타임 설정 확인 (DOMContentLoaded 후 실행)
        // supabase-config.js 로딩을 기다리기 위해 지연 실행
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof window !== 'undefined' && window.supabase) {
                const authUrl = window.supabase.authUrl;
                // authUrl가 URL 객체인 경우 처리
                const authUrlStr = authUrl ? String(authUrl) : 'N/A';
                const maskedUrl = authUrlStr.includes('@')
                    ? authUrlStr.replace(/\/\/[^@]+@/, '//***@')
                    : authUrlStr;
                console.log('[KIOSK] Supabase client initialized:', maskedUrl);
            } else {
                console.error('[KIOSK] WARNING: window.supabase not found!');
            }
        });
        // ===================================================================

        // Supabase 클라이언트 (DOMContentLoaded 후 할당)
        let sb = null;

        // 페이지 로드 시 로그인 체크
        async function checkKioskAuth() {
            const { data: { session } } = await supabase.auth.getSession();
            if (!session?.user) {
                alert('키오스크를 사용하려면 로그인이 필요합니다.');
                window.location.href = `login.html?redirect=${encodeURIComponent(window.location.pathname)}`;
                return false;
            }
            console.log('[Kiosk] 로그인 확인됨:', session.user.email);
            return true;
        }

        let kioskInput = '';
        let foundStudents = [];
        let selectedStudent = null;
        let pendingAction = null; // 'checkIn' or 'checkOut'

        // Demo mode students (local testing without Supabase)
        const DEMO_STUDENTS = [
            { id: 'demo-1', name: '강지민', parent_phone_last4: '5100' },
            { id: 'demo-2', name: '강서준', parent_phone_last4: '4397' }
        ];

        // ===== 학생별 보강시간/메모 조회 함수 =====
        // 학생 찾기 (ID 또는 이름으로 매칭)
        function findStudentInManagement(studentId, studentName) {
            const students = JSON.parse(localStorage.getItem('students') || '[]');
            // 먼저 ID로 찾기
            let student = students.find(s => s.id === studentId);
            // ID로 못 찾으면 이름으로 찾기
            if (!student && studentName) {
                student = students.find(s => s.name === studentName);
            }
            return student;
        }

        // 해당 날짜의 보강시간(분) 조회
        function getMakeupMinutesForStudent(studentId, dateStr = null, studentName = null) {
            const student = findStudentInManagement(studentId, studentName || (selectedStudent ? selectedStudent.name : null));
            if (!student || !student.makeupTimes) return 0;

            const today = dateStr || new Date().toISOString().split('T')[0];
            const activeMakeup = student.makeupTimes.find(m => m.startDate <= today && m.endDate >= today);
            console.log(`[보강시간 조회] 학생: ${student.name}, 날짜: ${today}, 보강시간: ${activeMakeup ? activeMakeup.additionalMinutes : 0}분`);
            return activeMakeup ? activeMakeup.additionalMinutes : 0;
        }

        // 해당 날짜의 활성 메모 목록 조회
        function getMemosForStudent(studentId, dateStr = null, studentName = null) {
            const student = findStudentInManagement(studentId, studentName || (selectedStudent ? selectedStudent.name : null));
            console.log(`[메모 조회] 학생 검색: id=${studentId}, name=${studentName}, 찾음=${student ? student.name : 'null'}`);

            if (!student || !student.memos) {
                console.log(`[메모 조회] 학생 없음 또는 메모 없음`);
                return [];
            }

            const today = dateStr || new Date().toISOString().split('T')[0];
            const activeMemos = student.memos.filter(m => m.startDate <= today && m.endDate >= today);
            console.log(`[메모 조회] 날짜: ${today}, 전체 메모: ${student.memos.length}개, 활성 메모: ${activeMemos.length}개`);
            return activeMemos;
        }

        // 학생 메모를 To-do 리스트에 추가 (franchise.html과 동일한 구조 사용)
        // franchise.html todos 구조: { "2026-02-05": [{ text, completed, color, studentId, memoId }], ... }
        function addStudentMemosToTodo(studentId, studentName, dateStr = null) {
            console.log(`[To-do 추가] 호출됨: studentId=${studentId}, studentName=${studentName}`);
            const memos = getMemosForStudent(studentId, dateStr, studentName);
            console.log(`[To-do 추가] 조회된 메모 수: ${memos.length}`);
            if (!memos.length) {
                console.log(`[To-do 추가] 추가할 메모가 없음`);
                return;
            }

            // todos는 날짜별 객체 구조 (franchise.html과 동일)
            let todos = {};
            try {
                const stored = JSON.parse(localStorage.getItem('todos') || '{}');
                // 객체인지 확인 (배열이면 빈 객체로 초기화)
                todos = (stored && typeof stored === 'object' && !Array.isArray(stored)) ? stored : {};
            } catch (e) {
                console.warn('[addStudentMemosToTodo] todos 파싱 실패, 빈 객체로 초기화');
                todos = {};
            }

            const today = dateStr || new Date().toISOString().split('T')[0];

            // 해당 날짜의 할일 배열 초기화
            if (!todos[today]) {
                todos[today] = [];
            }

            memos.forEach(memo => {
                // 이미 추가된 메모인지 확인 (같은 학생, 같은 메모 ID)
                const alreadyExists = todos[today].some(t =>
                    t && t.studentId === studentId && t.memoId === memo.id
                );

                if (!alreadyExists) {
                    todos[today].push({
                        text: `[${studentName}] ${memo.content}`,
                        completed: false,
                        color: 'hsl(200, 85%, 92%)', // 하늘색 파스텔톤
                        studentId: studentId,
                        memoId: memo.id
                    });
                    console.log(`[To-do 추가] 메모 추가됨: [${studentName}] ${memo.content}`);
                }
            });

            localStorage.setItem('todos', JSON.stringify(todos));

            console.log(`[Kiosk] ${studentName}의 메모 ${memos.length}개가 To-do에 추가됨 (storage 이벤트 자동 발생됨)`);
        }

        function kioskPressKey(key) {
            if (kioskInput.length < 4) {
                kioskInput += key;
                updateKioskDisplay();

                // 4자리 입력 완료 시 자동 검색
                if (kioskInput.length === 4) {
                    searchStudents();
                }
            }
        }

        function kioskBackspace() {
            kioskInput = kioskInput.slice(0, -1);
            updateKioskDisplay();
            hideStudentInfo();
        }

        function kioskClearInput() {
            kioskInput = '';
            updateKioskDisplay();
            hideStudentInfo();
            foundStudents = [];
            selectedStudent = null;
        }

        function updateKioskDisplay() {
            for (let i = 1; i <= 4; i++) {
                const digitEl = document.getElementById(`kiosk-digit-${i}`);
                if (digitEl) {
                    digitEl.textContent = kioskInput[i - 1] || '';
                }
            }
        }

        function showStudentInfo(student, statusText) {
            const infoEl = document.getElementById('student-info');
            const nameEl = document.getElementById('student-name');
            const landscapeNameEl = document.getElementById('student-name-landscape');
            const landscapeNameText = document.getElementById('student-name-landscape-text');

            nameEl.textContent = student.name;
            if (landscapeNameText) {
                landscapeNameText.textContent = student.name;
            }

            // parent_id 상태 배지 표시
            const existingBadge = document.getElementById('parent-app-badge');
            if (existingBadge) {
                existingBadge.remove();
            }

            // parent_id가 없는 경우 배지 추가 (단일 학생 선택 시)
            if (student && !student.parent_id && student.name) {
                const badge = document.createElement('div');
                badge.id = 'parent-app-badge';
                badge.className = 'mt-2 px-3 py-1 bg-gray-200 text-gray-600 text-sm rounded-full inline-flex items-center';
                badge.innerHTML = '<span class="material-symbols-outlined text-sm mr-1">link_off</span>부모 앱 미연동';
                nameEl.parentNode.appendChild(badge);
            }

            infoEl.classList.remove('hidden');
            landscapeNameEl.classList.remove('hidden');
        }

        function hideStudentInfo() {
            document.getElementById('student-info').classList.add('hidden');
            document.getElementById('student-name-landscape').classList.add('hidden');
        }

        // Supabase에서 학생 검색 (직접 fetch만 사용 - 빠른 응답)
        async function searchStudents() {
            console.log('[searchStudents] 시작, 입력값:', kioskInput);

            // isSupabaseConfigured 함수가 없으면 항상 false 처리 (데모 모드)
            const hasConfigFunction = typeof window.isSupabaseConfigured === 'function';
            const sbOk = hasConfigFunction && window.isSupabaseConfigured();
            console.log('[searchStudents] 데모 모드:', !sbOk);

            if (sbOk) {
                // 직접 fetch로 바로 검색 (SDK 거치지 않음 - 더 빠름)
                console.log('[searchStudents] 직접 fetch로 검색 시작...');
                const { data: fetchData, error: fetchError } = await searchStudentsDirectFetch(kioskInput);

                if (fetchError) {
                    console.error('학생 검색 오류 (직접 fetch):', fetchError);
                    showAlert('error', '오류', `검색 중 오류가 발생했습니다.\n${fetchError.message || 'Unknown error'}`);
                    return;
                }

                if (fetchData && fetchData.length > 0) {
                    foundStudents = fetchData;
                    if (fetchData.length === 1) {
                        // 학생이 1명이면 바로 선택
                        selectedStudent = fetchData[0];
                        showStudentInfo(selectedStudent, '학생을 찾았습니다');
                    } else {
                        // 여러 명이면 선택 모달 표시 (등원/하원 버튼 클릭 시)
                        selectedStudent = null;
                        showStudentInfo({ name: `${fetchData.length}명의 학생` }, '등원/하원 버튼을 눌러주세요');
                    }
                } else {
                    foundStudents = [];
                    selectedStudent = null;
                    showAlert('error', '검색 결과 없음', '등록되지 않은 번호입니다.\n회원가입 후 이용해주세요.');
                    kioskClearInput();
                }
            } else {
                // 데모 모드 - 로컬 학생 데이터 검색
                console.log('[searchStudents] 데모 모드 실행, DEMO_STUDENTS:', DEMO_STUDENTS);
                const matched = DEMO_STUDENTS.filter(s => s.parent_phone_last4 === kioskInput);
                console.log('[searchStudents] matched 결과:', matched);

                if (matched.length > 0) {
                    foundStudents = matched;
                    if (matched.length === 1) {
                        selectedStudent = matched[0];
                        showStudentInfo(selectedStudent, '학생을 찾았습니다 (데모 모드)');
                    } else {
                        selectedStudent = null;
                        showStudentInfo({ name: `${matched.length}명의 학생` }, '등원/하원 버튼을 눌러주세요 (데모 모드)');
                    }
                } else {
                    foundStudents = [];
                    selectedStudent = null;
                    showAlert('error', '검색 결과 없음', '등록되지 않은 번호입니다.\n데모 모드: 5100(강지민), 4397(강서준)');
                    kioskClearInput();
                }
            }
            console.log('[searchStudents] 완료, foundStudents:', foundStudents, 'selectedStudent:', selectedStudent);
        }

        // 학생 선택 모달 표시
        function showStudentSelectModal(action) {
            pendingAction = action;
            const modal = document.getElementById('student-select-modal');
            const list = document.getElementById('student-select-list');

            list.innerHTML = foundStudents.map(student => {
                // parent_id 유무에 따른 배지 표시
                const hasParent = !!student.parent_id;
                const badgeHtml = hasParent
                    ? ''

        async function performCheckOut() {
            if (!selectedStudent) {
                selectedStudent = foundStudents[0];
            }

            const sbOk = typeof window.isSupabaseConfigured === 'function' && window.isSupabaseConfigured();

            if (sbOk) {
                console.log('[performCheckOut] 직접 fetch로 하원 처리 시작...');

                if (fetchResult.success) {
                    const checkOutTime = new Date();
                    const timeStr = checkOutTime.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

                    // FCM 알림용 학생 데이터 저장 (kioskClearInput 전에 복사)
                    const studentForNotification = selectedStudent;

                    showAlert('success', '하원 완료',
                        `${selectedStudent.name}님, 하원 완료되었습니다!\n안녕히 가세요!\n\n하원시간: ${timeStr}`);
                    kioskClearInput();

                    // 하원 성공 후 FCM 알림 전송 (비차단)
                    sendFcmAttendanceNotification(studentForNotification, 'check_out', checkOutTime.toISOString())
                        .then(fcmResult => {
                            if (!fcmResult.success && fcmResult.skipReason !== 'session_missing') {
                                // FCM 실패 시 추가 안내 (비차단 토스트 또는 모달)
                                setTimeout(() => {
                                    showAlert('info', '알림', `출결은 완료되었으나 부모 앱 알림 전송에 실패했습니다.\n\n${fcmResult.message || ''}`);
                                }, 500);
                            }
                        })
                        .catch(err => console.error('[FCM] unhandled send error:', err));
                } else if (fetchResult.alreadyCheckedOut) {
                    showAlert('info', '알림', fetchResult.error);
                    kioskClearInput();
                } else if (fetchResult.noCheckIn) {
                    showAlert('info', '알림', fetchResult.error);
                    kioskClearInput();
                } else {
                    showAlert('error', '오류', `하원 처리 중 오류가 발생했습니다.\n${fetchResult.error}`);
                }
            } else {
                // 데모 모드 - localStorage 업데이트
                const existingAttendance = getLocalAttendance();
                const today = new Date().toISOString().split('T')[0];

                // 이미 하원했는지 확인 (completed 상태) - 오늘 날짜만
                const completedIndex = existingAttendance.findIndex(
                    a => a.student_id === selectedStudent.id &&
                        a.status === 'completed' &&
                        a.check_in_time && a.check_in_time.startsWith(today)
                );
                if (completedIndex !== -1) {
                    showAlert('info', '알림', `${selectedStudent.name}님은 이미 하원 처리되었습니다.`);
                    kioskClearInput();
                    return;
                }

                const attendanceIndex = existingAttendance.findIndex(
                    a => a.student_id === selectedStudent.id &&
                        (a.status === 'waiting' || a.status === 'seated') &&
                        a.check_in_time && a.check_in_time.startsWith(today)
                );

                if (attendanceIndex === -1) {
                    showAlert('info', '알림', `${selectedStudent.name}님은 등원 기록이 없습니다.`);
                    kioskClearInput();
                    return;
                }

                const attendance = existingAttendance[attendanceIndex];

                // 상태를 completed로 업데이트
                existingAttendance[attendanceIndex].status = 'completed';
                existingAttendance[attendanceIndex].type = 'check_out';

                localStorage.setItem('demo_attendance', JSON.stringify(existingAttendance));

                // 좌석에 배정되어 있었다면 좌석 비우기 (seat_id 또는 학생 이름으로 찾기)
                try {
                    const seatsData = localStorage.getItem('seats');
                    if (seatsData) {
                        const seats = JSON.parse(seatsData);
                        let seatIndex = -1;

                        // 1. seat_id로 찾기
                        if (attendance.seat_id) {
                            seatIndex = seats.findIndex(s => s.id == attendance.seat_id);
                        }

                        // 2. seat_id가 없거나 못 찾으면 학생 이름으로 찾기
                        if (seatIndex === -1) {
                            seatIndex = seats.findIndex(s => s.name === selectedStudent.name);
                        }

                        if (seatIndex !== -1) {
                            console.log(`[하원] 좌석 비우기: ${seats[seatIndex].name} -> 빈 좌석`);
                            seats[seatIndex].name = '';
                            seats[seatIndex].occupied = false;
                            seats[seatIndex].alarmTime = null;
                            seats[seatIndex].alarming = false;
                            seats[seatIndex].alarmStopped = false;
                            localStorage.setItem('seats', JSON.stringify(seats));

                            // storage 이벤트 발생하여 다른 탭에 알림
                            window.dispatchEvent(new StorageEvent('storage', {
                                key: 'seats',
                                newValue: JSON.stringify(seats)
                            }));
                        }
                    }
                } catch (e) {
                    console.error('Error clearing seat:', e);
                }

                const now = new Date();
                const timeStr = now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

                showAlert('success', '하원 완료 (데모 모드)',
                    `${selectedStudent.name}님, 하원 완료되었습니다!\n안녕히 가세요!\n\n하원시간: ${timeStr}`);
                kioskClearInput();
            }
        }

        // Web Push 알림 전송 함수

                if (!student.parent_phone) {

        // 직접 fetch로 Edge Function 호출 (폴백용) - 하드코딩된 키 제거, window.supabase 사용
        async function sendWebPushDirectFetch(requestBody) {
            try {
                // window.supabase 클라이언트 사용 (하드코딩된 키 제거)
                const { data, error } = await window.supabase.functions.invoke('send-web-push-notification', {

                if (data) {
                    console.log('[Kiosk] Web Push 알림 전송 성공:', data);

            } catch (error) {
                console.error('[Kiosk] 직접 invoke 오류:', error);
            }
        }

        // ===================================================================
        // FCM 401 장애 해결: 헬퍼 함수
        // ===================================================================

        // Trace ID 생성 (형식 통일, 멱등성 보장용)
        function generateTraceId() {
            return `fcm_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;
        }

        // Headers 객체에서 www-authenticate 안전 추출
        function extractWwwAuthenticate(headers) {
            if (!headers) return 'none';

            // Headers 객체인 경우 (.get 메서드 확인)
            if (typeof headers.get === 'function') {
                return headers.get('www-authenticate') || headers.get('Www-Authenticate') || 'none';
            }

            // 일반 객체인 경우
            return headers['www-authenticate'] || headers['Www-Authenticate'] || 'none';
        }

        // invoke 에러 상세 파싱 (result.error 1차 분기 지원)
        function extractInvokeErrorDetail(invokeError, resultData) {
            const detail = {
                name: invokeError?.name || 'UnknownError',
                message: invokeError?.message || 'No message',
                status: invokeError?.context?.status || 'unknown',
                headers: invokeError?.context?.headers || {},
                bodyRaw: invokeError?.context?.body ? JSON.stringify(invokeError.context.body) : 'none',
                wwwAuthenticate: extractWwwAuthenticate(invokeError?.context?.headers),
                // result.data로부터 함수 내부 응답 추출
                functionErrorCode: resultData?.error_code || null,
                functionSuccess: resultData?.success ?? null
            };
            console.error('[FCM_ERROR] Invoke error detail:', detail);
            return detail;
        }

        // 에러 코드 분류 (status, body, www-authenticate 조합)
        function classifyFcmError(detail) {
            const status = Number(detail.status) || 0;  // 숫자로 정규화
            const bodyCode = detail.functionErrorCode;
            const wwwAuth = detail.wwwAuthenticate;

            // 0. CORS/네트워크 실패 (함수 미도달)
            if (detail.name === 'TypeError' && detail.message?.includes('fetch')) {
                return 'NETWORK_OR_CORS_BLOCKED';
            }

            // 1. 함수 내부에서 명시한 에러코드가 있으면 우선
            if (bodyCode) {
                return bodyCode; // INVALID_USER_JWT, USER_NOT_FOUND 등
            }

            // 2. 게이트웨이 401 판별 (www-authenticate 헤더 + response body 기반)
            if (status === 401) {
                // www-authenticate 헤더가 있으면 게이트웨이 차단 확실
                if (wwwAuth && wwwAuth !== 'none') {
                    return 'GATEWAY_AUTH_REQUIRED';
                }
                // body에 {"code":401,"message":"Invalid JWT"} 패턴이 있으면 게이트웨이지 가능성
                if (detail.bodyRaw && (
                    detail.bodyRaw.includes('"code":401') ||
                    detail.bodyRaw.includes('Invalid JWT')
                )) {
                    return 'GATEWAY_JWT_INVALID';
                }
                // 그 외 401
                return 'UNAUTHORIZED';
            }

            // 3. 기타 상태코드
            if (status === 403) return 'FORBIDDEN';
            if (status === 404) return 'NOT_FOUND';
            if (status >= 500) return 'SERVER_ERROR';
            if (status >= 400) return 'CLIENT_ERROR';

            return 'UNKNOWN';
        }

        // 세션 만료 임박 시 선제 갱신
        async function ensureSessionFresh(traceId) {
            try {
                const { data: { session }, error } = await window.supabase.auth.getSession();

                if (error) {
                    console.warn(`[FCM_PRE][${traceId}] getSession error:`, error.message);
                    return false;
                }

                if (!session) {
                    console.warn(`[FCM_PRE][${traceId}] No session found`);
                    return false;
                }

                // 토큰 만료까지 남은 시간 계산
                const now = Math.floor(Date.now() / 1000);
                const expiresAt = session.expires_at;
                const remainingSeconds = expiresAt - now;

                console.log(`[FCM_PRE][${traceId}] Session expires in ${remainingSeconds}s`);

                // 임계값 이내이면 선제 갱신
                if (remainingSeconds < SESSION_REFRESH_THRESHOLD) {
                    console.log(`[FCM_PRE][${traceId}] Session expiring soon, refreshing...`);
                    const { data: refreshData, error: refreshError } =
                        await window.supabase.auth.refreshSession();

                    if (refreshError) {
                        console.error(`[FCM_PRE][${traceId}] Refresh failed:`, refreshError.message);
                        return false;
                    }

                    const newRemaining = refreshData.session?.expires_at
                        ? refreshData.session.expires_at - Math.floor(Date.now() / 1000)
                        : 0;
                    console.log(`[FCM_PRE][${traceId}] Session refreshed, new expires in ${newRemaining}s`);
                    return true;
                }

                return true;
            } catch (e) {
                console.error(`[FCM_PRE][${traceId}] ensureSessionFresh error:`, e);
                return false;
            }
        }

        // FCM 알림 전송 함수 (모바일 앱용)
        /**
         * @param {Object} student - selectedStudent 객체 (parent_id 포함 필수)
         * @param {string} actionType - 'check_in' 또는 'check_out'
         * @param {string} attendanceTimeIso - 출결 시간 ISO 문자열
         * @returns {Promise<Object>} - { success: boolean, message?: string, skipReason?: string }
         */
        async function sendFcmAttendanceNotification(student, actionType, attendanceTimeIso) {
            // 헬퍼 함수로 traceId 생성
            const traceId = generateTraceId();
            console.log(`[FCM_SEND][${traceId}] Starting FCM notification for ${student?.name || 'unknown'}`);

            // student null 체크 (안전장치)
            if (!student) {
                console.warn(`[FCM_SEND][${traceId}] 스킵 - student 파라미터가 null`);
                return { success: false, skipReason: 'student_null', message: '학생 정보가 없습니다' };
            }

            // parent_id 확인
            if (!student.parent_id) {
                console.warn(`[FCM_SEND][${traceId}] 스킵 - parent_id 없음 (student_id: ${student.id}, name: ${student.name})`);
                return { success: false, skipReason: 'no_parent_id', message: '부모 앱 미연동 상태입니다' };
            }

            // 0단계: 선제 세션 갱신 (401 예방)
            const sessionFresh = await ensureSessionFresh(traceId);
            if (!sessionFresh) {
                console.warn(`[FCM_SEND][${traceId}] Session not fresh, continuing anyway...`);
            }

            // Payload 준비
            const isCheckIn = actionType === 'check_in';
            const timeStr = new Date(attendanceTimeIso).toLocaleTimeString('ko-KR', {
                hour: '2-digit',
                minute: '2-digit'
            });

            const payload = {
                recipient_id: student.parent_id,
                type: isCheckIn ? 'attendance_check_in' : 'attendance_check_out',
                title: isCheckIn ? '등원 알림' : '하원 알림',
                body: isCheckIn
                    ? `${student.name}님이 등원했습니다`
                    : `${student.name}님이 ${timeStr}에 하원했습니다`,
                data: {
                    student_id: student.id,
                    student_name: student.name,
                    attendance_time: attendanceTimeIso,
                    time_display: timeStr,
                    type: actionType
                },
                priority: 'high',
                target_type: 'parent',
                trace_id: traceId
            };

            // ✅ Supabase SDK functions.invoke() 사용 (인증 헤더 자동 처리)
            try {
                console.log(`[FCM_SEND][${traceId}] Calling fcm-send-notification via SDK invoke`);

                const { data: responseData, error: invokeError } = await window.supabase.functions.invoke('fcm-send-notification', {
                    body: payload
                });

                if (invokeError) {
                    console.error(`[FCM_SEND][${traceId}] Invoke error:`, invokeError.message, invokeError);

                    // invoke 에러의 상태코드 추출
                    const status = invokeError.context?.status || invokeError.status;
                    const errorCode = status === 401 ? 'GATEWAY_JWT_INVALID' : `INVOKE_ERROR`;

                    console.error(`[FCM_SEND][${traceId}] Error code:`, errorCode, 'status:', status);

                    return {
                        success: false,
                        error_code: errorCode,
                        message: getUserMessage(errorCode, invokeError.message),
                        traceId
                    };
                }

                console.log(`[FCM_SEND][${traceId}] Response data:`, responseData);

                // === 성공 응답 처리 ===
                if (responseData && responseData.success) {
                    console.log(`[FCM_SEND][${traceId}] Success!`);
                    return { success: true, traceId };
                }

                // === 함수 내부 에러 처리 ===
                if (responseData && responseData.error_code) {
                    console.error(`[FCM_SEND][${traceId}] Function error:`, responseData.error_code);
                    return {
                        success: false,
                        error_code: responseData.error_code,
                        message: getUserMessage(responseData.error_code),
                        traceId
                    };
                }

                // === 알 수 없는 응답 ===
                console.warn(`[FCM_SEND][${traceId}] Unknown response:`, responseData);
                return {
                    success: false,
                    error_code: 'UNKNOWN_RESPONSE',
                    message: getUserMessage('UNKNOWN_RESPONSE'),
                    traceId
                };

            } catch (unexpectedError) {
                console.error(`[FCM_SEND][${traceId}] Unexpected error:`, unexpectedError);
                return {
                    success: false,
                    error_code: 'UNEXPECTED_ERROR',
                    message: getUserMessage('UNEXPECTED_ERROR'),
                    traceId
                };
            }
        }

        // 옛날 미완료 출결 기록 정리
        async function cleanupOldAttendance() {
            const sbOk = typeof window.isSupabaseConfigured === 'function' && window.isSupabaseConfigured() && sb;

            if (sbOk) {
                // Supabase 모드 - 어제 및 그 이전 미완료 기록을 completed로 변경
                try {
                    const today = new Date().toISOString().split('T')[0];

                    // 어제 및 그 이전의 waiting/seated 상태 기록 찾기
                    const { data: oldRecords, error } = await sb
                        .from('attendance')
                        .select('id, student_id, student_name, check_in_time, date')
                        .in('status', ['waiting', 'seated'])
                        .lt('date', today);

                    if (error) {
                        // 타임아웃/AbortError는 치명적이지 않으므로 조용히 처리
                        const isTimeoutError =
                            error.message?.includes('timeout') ||
                            error.message?.includes('AbortError') ||
                            error.message?.includes('aborted') ||
                            error.hint?.includes('timeout') ||
                            error.hint?.includes('aborted');

                        if (isTimeoutError) {
                            console.warn('[정리] 옛날 기록 조회 타임아웃 (무시)');
                        } else {
                            console.error('[정리] 옛날 기록 조회 실패:', error);
                        }
                        return;
                    }

                    if (oldRecords && oldRecords.length > 0) {
                        console.log('[정리] 미완료 기록', oldRecords.length, '개 발견, 정리 시작...');

                        // 모두 completed 상태로 변경
                        const { error: updateError } = await sb
                            .from('attendance')
                            .update({
                                status: 'completed',
                                type: 'check_out',
                                check_out: new Date().toISOString()
                            })
                            .in('id', oldRecords.map(r => r.id));

                        if (updateError) {
                            console.error('[정리] 기록 업데이트 실패:', updateError);
                        } else {
                            console.log('[정리] 미완료 기록', oldRecords.length, '개를 완료 처리했습니다.');
                        }
                    } else {
                        console.log('[정리] 정리할 미완료 기록이 없습니다.');
                    }

                } catch (e) {
                    // 타임아웃/AbortError는 치명적이지 않으므로 조용히 처리
                    const isTimeoutError =
                        e.message?.includes('timeout') ||
                        e.message?.includes('AbortError') ||
                        e.message?.includes('aborted');

                    if (isTimeoutError) {
                        console.warn('[정리] 타임아웃 오류 (무시)');
                    } else {
                        console.error('[정리] 오류:', e);
                    }
                }
            } else {
                // 데모 모드 - localStorage 정리
                try {
                    const today = new Date().toISOString().split('T')[0];
                    const existingAttendance = getLocalAttendance();

                    const needsUpdate = existingAttendance.some(a =>
                        (a.status === 'waiting' || a.status === 'seated') &&
                        a.check_in_time && !a.check_in_time.startsWith(today)
                    );

                    if (needsUpdate) {
                        console.log('[정리] 데모 모드: 미완료 기록 정리...');

                        existingAttendance.forEach(a => {
                            if ((a.status === 'waiting' || a.status === 'seated') &&
                                a.check_in_time && !a.check_in_time.startsWith(today)) {
                                a.status = 'completed';
                                a.type = 'check_out';
                            }
                        });

                        localStorage.setItem('demo_attendance', JSON.stringify(existingAttendance));
                        console.log('[정리] 데모 모드: 정리 완료');
                    }

                } catch (e) {
                    console.error('[정리] 데모 모드 오류:', e);
                }
            }
        }

                console.log('[performCheckOutDirectFetch] 등원 기록 응답:', attendanceData);
                if (!attendanceData || attendanceData.length === 0) {
                    return { success: false, error: `${selectedStudent.name}님은 등원 기록이 없습니다.`, noCheckIn: true };
                }

                const attendance = attendanceData[0];
                console.log('[performCheckOutDirectFetch] 찾은 등원 기록:', attendance);

                // 3. 하원 처리 (상태 업데이트)
                const now = new Date();  // FCM 알림용
                const { data: updateResult, error: updateError } = await window.supabase
                    .from('attendance')
                    .update({
                        type: 'check_out',
                        status: 'completed',
                        check_out: now.toISOString()
                    })
                    .eq('id', attendance.id)
                    .select();

                if (updateError) {
                    console.error('[performCheckOutDirectFetch] 하원 처리 실패:', updateError);
                    return { success: false, error: `하원 처리 실패: ${updateError.message}` };
                }

                console.log('[performCheckOutDirectFetch] 하원 처리 성공:', updateResult);

                // 4. 좌석 비우기 (Supabase + localStorage 둘 다)
                // Supabase 좌석 비우기
                if (attendance.seat_id) {
                    console.log('[performCheckOutDirectFetch] Supabase 좌석 비우기:', attendance.seat_id);
                    const { error: seatError } = await window.supabase
                        .from('seats')
                        .update({
                            occupied: false,
                            student_id: null,
                            student_name: null,
                            alarm_time: null,
                            alarming: false,
                            alarm_stopped: false
                        })
                        .eq('id', attendance.seat_id);

                    if (seatError) {
                        console.error('[performCheckOutDirectFetch] Supabase 좌석 비우기 실패:', seatError);
                    } else {
                        console.log('[performCheckOutDirectFetch] Supabase 좌석 비우기 성공');
                    }
                }

                // localStorage 좌석 비우기 (seat_id 또는 학생 이름으로 찾기)
                try {
                    const seatsData = localStorage.getItem('seats');
                    if (seatsData) {
                        const seats = JSON.parse(seatsData);
                        let seatIndex = -1;

                        // 1. seat_id로 찾기
                        if (attendance.seat_id) {
                            seatIndex = seats.findIndex(s => s.id == attendance.seat_id);
                        }

                        // 2. seat_id가 없거나 못 찾으면 학생 이름으로 찾기
                        if (seatIndex === -1) {
                            seatIndex = seats.findIndex(s => s.name === selectedStudent.name);
                        }

                        if (seatIndex !== -1) {
                            console.log(`[performCheckOutDirectFetch] localStorage 좌석 비우기: ${seats[seatIndex].name}`);
                            seats[seatIndex].name = '';
                            seats[seatIndex].occupied = false;
                            seats[seatIndex].alarmTime = null;
                            seats[seatIndex].alarming = false;
                            seats[seatIndex].alarmStopped = false;
                            localStorage.setItem('seats', JSON.stringify(seats));

                            // storage 이벤트 발생
                            window.dispatchEvent(new StorageEvent('storage', {
                                key: 'seats',
                                newValue: JSON.stringify(seats)
                            }));
                        }
                    }
                } catch (e) {
                    console.error('[performCheckOutDirectFetch] localStorage 좌석 비우기 실패:', e);
                }

                // 5. Web Push 알림 전송 (비동기 - 팝업 지연 방지)
                sendWebPushNotification(selectedStudent, 'check_out').catch(err => {
                    console.error('[Kiosk] Push 알림 백그라운드 에러:', err);
                });

                return { success: true, attendance };

            } catch (error) {
                console.error('[performCheckOutDirectFetch] 오류:', error);
                return { success: false, error: error.message };
            }
        }

        // 스크립트 로드 후 즉시 초기화 시도
        (function () {
            // 약간의 지연 후 실행 (다른 스크립트가 로드될 때까지 대기)
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initKiosk);
            } else {
                // 이미 로드된 경우 즉시 실행
                initKiosk();
            }
        })();

        // ESC 키로 모달 닫기
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeAlertModal();
                closeStudentSelectModal();
            }
        });
    </script>
</body>

</html>
