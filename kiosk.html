            const student = findStudentInManagement(studentId, studentName || (selectedStudent ? selectedStudent.name : null));

            const today = dateStr || new Date().toISOString().split('T')[0];

            // ===== Override: multi-recipient notification path =====
        async function sendCheckInNotification(studentId, studentName, timeStr) {
            await sendAttendanceNotifications('check_in', studentId, studentName, timeStr);
        }

        async function sendCheckOutNotification(studentId, studentName, timeStr) {
            await sendAttendanceNotifications('check_out', studentId, studentName, timeStr);
        }

        async function sendAttendanceNotifications(eventType, studentId, studentName, timeStr) {
            try {
                if (!sb) {
                    console.warn('[Kiosk] Supabase client not ready; skip notifications.');
                    return;
                }

                let recipients = null;
                const { data, error } = await sb.rpc('get_student_notification_recipients', {
                    p_student_id: studentId,
                    p_event_type: eventType
                });

                if (error || data?.success === false) {
                    console.warn('[Kiosk] recipient RPC failed; fallback to legacy parent_id.', error || data);
                    recipients = await getLegacySingleRecipient(studentId);
                } else {
                    recipients = data;
                }

                const accountRecipients = Array.isArray(recipients?.account_recipients) ? recipients.account_recipients : [];
                for (const account of accountRecipients) {
                    const parentId = account?.parent_id;
                    if (!parentId) continue;
                    await sendWebPushByParentId(studentId, parentId, eventType, studentName);
                    await sendFCMNotification(
                        parentId,
                        eventType === 'check_in' ? 'attendance_check_in' : 'attendance_check_out',
                        `${studentName}님이 ${eventType === 'check_in' ? '등원' : '하원'}했습니다`,
                        `${timeStr}에 ${eventType === 'check_in' ? '등원' : '하원'} 완료`,
                        eventType === 'check_in'
                            ? { student_id: studentId, student_name: studentName, check_in_time: new Date().toISOString() }
                            : { student_id: studentId, student_name: studentName, check_out_time: new Date().toISOString() }
                    );
                }

                const queuePayload = {
                    student_id: studentId,
                    student_name: studentName,
                    event_type: eventType,
                    event_time: new Date().toISOString()
                };
                const { error: queueError } = await sb.rpc('enqueue_student_phone_notifications', {
                    p_student_id: studentId,
                    p_event_type: eventType,
                    p_payload: queuePayload
                });
                if (queueError) {
                    console.warn('[Kiosk] phone queue enqueue failed:', queueError);
                }
            } catch (error) {
                console.error('[Kiosk] sendAttendanceNotifications error:', error);
            }
        }

        async function getLegacySingleRecipient(studentId) {
            try {
                const { data: row, error } = await sb
                    .from('students')
                    .select('parent_id')
                    .eq('id', studentId)
                    .maybeSingle();
                if (error || !row?.parent_id) {
                    return { account_recipients: [], phone_recipients: [] };
                }
                return {
                    account_recipients: [{ parent_id: row.parent_id, channels: ['web_push', 'fcm'] }],
                    phone_recipients: []
                };
            } catch (e) {
                console.warn('[Kiosk] legacy recipient fallback failed:', e);
                return { account_recipients: [], phone_recipients: [] };
            }
        }

        async function sendWebPushByParentId(studentId, parentId, type, studentName) {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (!session?.access_token) return;

                const res = await fetch(`${SUPABASE_URL}/functions/v1/send-web-push-notification`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${session.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        student_id: studentId,
                        parent_id: parentId,
                        type: type,
                        student_name: studentName
                    })
                });

                if (!res.ok) {
                    console.warn('[Kiosk] Web push response:', res.status, await res.text());
                }
            } catch (error) {
                console.warn('[Kiosk] Web push error:', error);
            }
        }

        async function sendFCMNotification(parentId, type, title, body, data) {
            try {
                const { data: { session } } = await sb.auth.getSession();
                if (!session?.access_token) return;

                const fcmResponse = await fetch(`${SUPABASE_URL}/functions/v1/fcm-send-notification`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${session.access_token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        recipient_id: parentId,
                        type,
                        title,
                        body,
                        data,
                        priority: 'high',
                        target_type: 'parent'
                    })
                });

                if (!fcmResponse.ok && ![404, 500].includes(fcmResponse.status)) {
                    console.warn('[Kiosk] FCM response:', fcmResponse.status, await fcmResponse.text());
                }
            } catch (error) {
                console.log('[Kiosk] FCM error (ignored):', error.message);
            }
        }
